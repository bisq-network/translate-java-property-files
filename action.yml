name: "Localize Pipeline"
description: >-
  Agent-friendly AI localization pipeline that translates changed Java
  .properties or JSON files with AISuite, OpenAI-compatible endpoints, or local
  models, then opens a reviewable pull request.

branding:
  icon: globe
  color: blue

inputs:
  config-file:
    description: "Path to the translation config in your repo (see config.example.yaml or run localize init)."
    required: false
    default: "config.yaml"
  openai-api-key:
    description: "OpenAI API key. Leave empty when using a local endpoint (Ollama) via api-base-url."
    required: false
    default: ""
  api-base-url:
    description: "OpenAI-compatible endpoint, e.g. http://localhost:11434/v1 for Ollama. Overrides config."
    required: false
    default: ""
  review-model:
    description: "Override the holistic-review model (maps to REVIEW_MODEL_NAME)."
    required: false
    default: ""
  plugin-modules:
    description: "Comma-separated localize plugin modules to import before check/run."
    required: false
    default: ""
  plugin-install-command:
    description: "Optional shell command to install custom adapter packages before check/run."
    required: false
    default: ""
  diff-base:
    description: >-
      Git ref to detect changed source strings against (e.g. the push/PR base). The
      pipeline translates only keys changed since this ref. Defaults to the push base.
    required: false
    default: ${{ github.event.before }}
  process-all-files:
    description: >-
      Translate ALL locale files instead of only those changed since diff-base. Use
      true for a one-time initial run; leave false for incremental CI.
    required: false
    default: "false"
  dry-run:
    description: "Run discovery and validation without model calls or translation writes."
    required: false
    default: "false"
  open-pr:
    description: "Open a pull request with the translations (true) or just leave the changes (false)."
    required: false
    default: "true"
  pr-branch:
    description: "Branch to push the translations to."
    required: false
    default: "ai-translations"
  pr-title:
    description: "Title of the pull request."
    required: false
    default: "Update AI translations"
  commit-message:
    description: "Commit message for the translation changes."
    required: false
    default: "Update AI translations"
  github-token:
    description: "Token used to push the branch and open the PR."
    required: false
    default: ${{ github.token }}
  python-version:
    description: "Python version to run the pipeline with."
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install pipeline dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Install plugin dependencies
      if: ${{ inputs.plugin-install-command != '' }}
      shell: bash
      env:
        PLUGIN_INSTALL_COMMAND: ${{ inputs.plugin-install-command }}
      run: |
        set -euo pipefail
        bash -lc "$PLUGIN_INSTALL_COMMAND"

    - name: Check localization setup
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        PYTHONPATH: ${{ github.action_path }}
        TRANSLATOR_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config-file }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        LOCALIZE_API_BASE_URL_INPUT: ${{ inputs.api-base-url }}
        LOCALIZE_REVIEW_MODEL_INPUT: ${{ inputs.review-model }}
        LOCALIZE_DRY_RUN: ${{ inputs.dry-run }}
        LOCALIZE_PLUGIN_MODULES: ${{ inputs.plugin-modules }}
      run: |
        set -euo pipefail
        if [ -n "${LOCALIZE_API_BASE_URL_INPUT:-}" ]; then
          export OPENAI_BASE_URL="$LOCALIZE_API_BASE_URL_INPUT"
        else
          unset OPENAI_BASE_URL
        fi
        if [ -n "${LOCALIZE_REVIEW_MODEL_INPUT:-}" ]; then
          export REVIEW_MODEL_NAME="$LOCALIZE_REVIEW_MODEL_INPUT"
        else
          unset REVIEW_MODEL_NAME
        fi
        python -m localize.cli check --config "$TRANSLATOR_CONFIG_FILE"

    - name: Translate changed strings
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        PYTHONPATH: ${{ github.action_path }}
        TRANSLATOR_CONFIG_FILE: ${{ github.workspace }}/${{ inputs.config-file }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        LOCALIZE_API_BASE_URL_INPUT: ${{ inputs.api-base-url }}
        LOCALIZE_REVIEW_MODEL_INPUT: ${{ inputs.review-model }}
        PROCESS_ALL_FILES: ${{ inputs.process-all-files }}
        DIFF_BASE_INPUT: ${{ inputs.diff-base }}
        LOCALIZE_DRY_RUN: ${{ inputs.dry-run }}
        LOCALIZE_PLUGIN_MODULES: ${{ inputs.plugin-modules }}
      run: |
        set -euo pipefail
        if [ -n "${LOCALIZE_API_BASE_URL_INPUT:-}" ]; then
          export OPENAI_BASE_URL="$LOCALIZE_API_BASE_URL_INPUT"
        else
          unset OPENAI_BASE_URL
        fi
        if [ -n "${LOCALIZE_REVIEW_MODEL_INPUT:-}" ]; then
          export REVIEW_MODEL_NAME="$LOCALIZE_REVIEW_MODEL_INPUT"
        else
          unset REVIEW_MODEL_NAME
        fi
        # An all-zero SHA (first push to a branch) is not a valid diff base; fall back
        # to working-tree detection rather than failing the run.
        if [[ "${DIFF_BASE_INPUT:-}" =~ ^0*$ ]]; then
          export TRANSLATION_DIFF_BASE=""
        else
          export TRANSLATION_DIFF_BASE="$DIFF_BASE_INPUT"
        fi
        python -m localize.cli run --config "$TRANSLATOR_CONFIG_FILE"

    - name: Open pull request
      if: ${{ inputs.open-pr == 'true' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        # Pass user-controlled inputs through the environment, never interpolated
        # directly into the script, to avoid shell/command injection.
        GH_TOKEN: ${{ inputs.github-token }}
        PR_BRANCH: ${{ inputs.pr-branch }}
        COMMIT_MSG: ${{ inputs.commit-message }}
        PR_TITLE: ${{ inputs.pr-title }}
      run: |
        set -euo pipefail
        if git diff --quiet && git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
          echo "No translation changes; nothing to open a PR for."
          exit 0
        fi
        branch="$PR_BRANCH"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -B "$branch"
        git add -A
        git commit -m "$COMMIT_MSG"
        git push --force-with-lease origin "$branch"
        if gh pr view "$branch" >/dev/null 2>&1; then
          echo "Pull request already exists for $branch; it now points at the latest push."
        else
          gh pr create --head "$branch" --title "$PR_TITLE" \
            --body "Automated translation update. Review the changed localization files before merging."
        fi
