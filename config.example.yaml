# Minimal example configuration — copy to config.yaml and edit.
#
# This is a small, generic starting point. For a richer, real-world example with
# per-locale style rules, learned semantic quality rules, and a large glossary,
# see profiles/bisq/config.yaml (the Bisq production profile).
#
# Tip: run `./init.sh --input-folder path/to/i18n` to scaffold this automatically
# by detecting the locales from your existing *.properties files.

# --- Paths (required) ---
# Absolute path to the git repository whose .properties files you translate.
target_project_root: "/path/to/your/git/repo"
# Folder containing the .properties files (absolute, or relative to target_project_root).
input_folder: "/path/to/properties/files"

# --- Localization format ---
# Built-in: "java_properties". Future formats can provide the same metadata shape.
localization_format: "java_properties"

# Optional product/domain context injected into translation prompts.
# Keep this generic for reusable configs; project-specific configs can be more precise.
project_context: "Translate concise UI text for a software product."

# --- Where translations come from before the AI step ---
# "git"      = use the .properties files already in your repository (no external TMS).
# "transifex" = pull the latest translations via the `tx` CLI first (needs .tx/config).
# Foreign OSS projects without Transifex should keep "git".
translation_source: "git"

# --- Model / provider ---
model_name: "gpt-4o-mini"          # fast initial translation
review_model_name: "gpt-4o"        # holistic review pass (set equal to model_name to save cost)

# (Optional) OpenAI-compatible endpoint. Point this at a local Ollama server to
# translate with zero data egress and no API key (set the model names to a model
# you have pulled, e.g. "llama3.1"). Env var OPENAI_BASE_URL overrides this.
# api_base_url: "http://localhost:11434/v1"

# --- Glossary (optional but recommended) ---
# JSON file of per-language term mappings. See glossary.example.json for the format.
glossary_file_path: "glossary.example.json"

# Brand/technical terms that must never be translated.
brand_technical_glossary:
  - Bitcoin
  - GitHub

# If true, the script logs actions without calling the API or writing files.
dry_run: false

# --- Target locales ---
# One entry per language you translate into (the source language is excluded).
supported_locales:
  - code: "de"
    name: "German"
  - code: "es"
    name: "Spanish"
  - code: "fr"
    name: "French"

# (Optional) Per-locale style guidance injected into the AI prompt.
# style_rules:
#   de:
#     - "Use the formal 'Sie' form of address."
